<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta viewport="width=device-width, initial-scale=1.0">
  <title>TopSort</title>

</head>
<body>
<h1>Topologische Sortierung</h1>
<p>Geben Sie die Vorrang-Relationen in folgendem Format ein:</p>

<textarea id="relationsInput" placeholder="zb. schlafen, essen, trinken" style="width: 80vw; height:20vh"></textarea>
<br>
<button onclick="calculateTopologicalSort()">Topologische Sortierung berechnen</button>

<div id="result"></div>

<script>
  function parseRelations(input) {
    const relations = input.split('\n').map(line => line.trim()).filter(line => line);
    const graph = {};
    relations.forEach(relation => {
      const [from, to] = relation.split('->').map(node => node.trim());
      if (!graph[from]) graph[from] = [];
      if (!graph[to]) graph[to] = [];
      graph[from].push(to);
    });
    return graph;
  }

  function topologicalSort(graph) {
    const visited = new Set();
    const stack = [];
    const temp = new Set();

    function visit(node) {
      if (temp.has(node)) throw new Error("Zyklische Abhängigkeit gefunden");
      if (!visited.has(node)) {
        temp.add(node);
        graph[node].forEach(neighbor => visit(neighbor));
        temp.delete(node);
        visited.add(node);
        stack.push(node);
      }
    }

    Object.keys(graph).forEach(node => {
      if (!visited.has(node)) visit(node);
    });

    return stack.reverse();
  }

  function calculateTopologicalSort() {
    const input = document.getElementById('relationsInput').value;
    try {
      const graph = parseRelations(input);
      const sorted = topologicalSort(graph);
      document.getElementById('result').textContent = `Topologische Sortierung: ${sorted.join(' -> ')}`;
    } catch (error) {
      document.getElementById('result').textContent = error.message;
    }
  }
</script>
</body>
</html>
